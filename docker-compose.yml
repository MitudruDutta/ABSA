# Runs the ABSA system as two services:
#   api       - FastAPI hosting the RoBERTa model        (port 8000)
#   streamlit - thin UI that calls the api over HTTP      (port 8501)
#
# Usage:  docker compose up --build
# The trained model (models/roberta-absa) is mounted in, not baked into the image.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      - ABSA_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
